<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Step Style</title>
    <!-- <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> -->
    <link rel="stylesheet" href="/css/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/css/css/footer.css" />
    <link rel="stylesheet" href="/css/css/order.css" />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">
          <img
            src="/images/logo.png"
            alt="Logo"
            width="30"
            height="24"
            class="d-inline-block align-text-top"
          />
          Step Style
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/html/index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/html/login.html">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/html/community.html">Community</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/html/shop.html">Shop</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/html/cart.html"
                >Cart
                <span class="badge bg-dark ms-1" id="cartCount">0</span></a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main class="container my-5">
      <h2 class="mb-4">Your Cart</h2>
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="table-responsive">
            <table class="table table-striped align-middle">
              <thead>
                <tr>
                  <th>Item</th>
                  <th>Price</th>
                  <th>Quantity</th>
                  <th>Subtotal</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="cartTableBody">
                <tr>
                  <td colspan="5" class="text-center text-muted py-4">
                    No items in cart yet.
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <div class="col-lg-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <h4 class="card-title mb-3">Order Summary</h4>
              <p class="d-flex justify-content-between mb-2">
                <span>Total Items:</span>
                <strong id="totalItems">0</strong>
              </p>
              <p class="d-flex justify-content-between mb-4">
                <span>Total Amount:</span>
                <strong id="totalAmount">UGX 0.00</strong>
              </p>
              <a href="/html/thanks.html" id="placeOrderBtn" class="btn btn-success w-100" disabled>
                Place Order
              </a>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- ✅ FOOTER INSIDE BODY -->
    <footer class="footer-fluid text-center py-3">
      <div class="footer-bottom">
        <p>
          @ 2026 | Company's Name <br />
          All rights are reserved
        </p>
      </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/js/bootstrap.bundle.min.js"></script>
    <script src="/js/js/order.js"></script> 
  </body>
</html>
